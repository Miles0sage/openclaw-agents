<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Job Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-void: #05060a;
        --bg-primary: #08090c;
        --bg-panel: #0d0f14;
        --bg-card: #111318;
        --bg-elevated: #161820;
        --bg-hover: #1c1f28;
        --border-dim: #1a1d26;
        --border-mid: #252834;
        --border-bright: #333848;
        --amber: #e8a832;
        --amber-bright: #f0be50;
        --amber-dim: #b8842a;
        --amber-glow: rgba(232, 168, 50, 0.12);
        --amber-ghost: rgba(232, 168, 50, 0.05);
        --text-primary: #e4e4e8;
        --text-secondary: #8e919e;
        --text-dim: #5c5f6c;
        --green: #34d399;
        --green-dim: rgba(52, 211, 153, 0.15);
        --red: #f87171;
        --red-dim: rgba(248, 113, 113, 0.15);
        --blue: #60a5fa;
        --blue-dim: rgba(96, 165, 250, 0.15);
        --yellow: #fbbf24;
        --yellow-dim: rgba(251, 191, 36, 0.15);
        --purple: #a78bfa;
        --purple-dim: rgba(167, 139, 250, 0.15);
        --cyan: #22d3ee;
        --cyan-dim: rgba(34, 211, 238, 0.15);
        --font-display: "Outfit", sans-serif;
        --font-body: "IBM Plex Sans", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg-void);
        color: var(--text-primary);
        font-family: var(--font-body);
        font-size: 14px;
        line-height: 1.5;
      }

      body {
        display: flex;
        overflow: hidden;
        position: relative;
      }

      /* Scanline overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.15),
          rgba(0, 0, 0, 0.15) 1px,
          transparent 1px,
          transparent 2px
        );
        z-index: 9999;
      }

      /* ========== SIDEBAR ========== */
      .sidebar {
        width: 300px;
        min-width: 300px;
        background: var(--bg-primary);
        border-right: 1px solid var(--border-dim);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid var(--border-dim);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .sidebar-title {
        font-family: var(--font-display);
        font-size: 16px;
        font-weight: 700;
        color: var(--amber);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .sidebar-stats {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
      }

      .filter-bar {
        padding: 8px 16px;
        border-bottom: 1px solid var(--border-dim);
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .filter-chip {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        color: var(--text-secondary);
        font-family: var(--font-mono);
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 99px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-chip:hover {
        border-color: var(--border-bright);
        color: var(--text-primary);
      }
      .filter-chip.active {
        background: var(--amber-glow);
        border-color: var(--amber-dim);
        color: var(--amber);
      }

      .job-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .job-list::-webkit-scrollbar {
        width: 4px;
      }
      .job-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .job-list::-webkit-scrollbar-thumb {
        background: var(--border-mid);
        border-radius: 2px;
      }

      .job-card {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        border-radius: var(--radius-md);
        padding: 10px 12px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .job-card:hover {
        background: var(--bg-hover);
        border-color: var(--border-bright);
      }
      .job-card.active {
        background: var(--amber-glow);
        border-color: var(--amber-dim);
      }

      .job-card-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .job-project {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 12px;
        color: var(--text-primary);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .status-badge {
        font-family: var(--font-mono);
        font-size: 9px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 99px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .status-done {
        background: var(--green-dim);
        color: var(--green);
      }
      .status-pr_ready {
        background: var(--blue-dim);
        color: var(--blue);
      }
      .status-running {
        background: var(--yellow-dim);
        color: var(--yellow);
      }
      .status-failed,
      .status-killed_phase_iteration_limit,
      .status-credit_exhausted {
        background: var(--red-dim);
        color: var(--red);
      }
      .status-queued {
        background: var(--purple-dim);
        color: var(--purple);
      }

      .job-desc {
        font-size: 11px;
        color: var(--text-secondary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .job-meta {
        display: flex;
        gap: 12px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
      }

      .job-meta .cost {
        color: var(--amber-dim);
      }

      /* ========== MAIN CONTENT ========== */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .main-header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border-dim);
        background: var(--bg-primary);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .main-title {
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .main-subtitle {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 2px;
      }

      .main-badges {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .agent-badge {
        background: var(--purple-dim);
        color: var(--purple);
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 99px;
      }

      .cost-badge {
        background: var(--amber-glow);
        color: var(--amber);
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 99px;
      }

      .success-badge {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 99px;
      }

      .success-badge.pass {
        background: var(--green-dim);
        color: var(--green);
      }
      .success-badge.fail {
        background: var(--red-dim);
        color: var(--red);
      }

      /* ========== CONTENT AREA ========== */
      .content-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .content-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .content-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .content-scroll::-webkit-scrollbar-thumb {
        background: var(--border-mid);
        border-radius: 3px;
      }

      /* Empty state */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 12px;
        color: var(--text-dim);
      }

      .empty-state .icon {
        font-size: 48px;
        opacity: 0.3;
      }

      .empty-state .msg {
        font-family: var(--font-display);
        font-size: 16px;
        color: var(--text-secondary);
      }

      /* ========== PHASE PIPELINE ========== */
      .pipeline {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .phase-node {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex: 1;
        cursor: pointer;
        padding: 8px 4px;
        border-radius: var(--radius-md);
        transition: background 0.15s;
      }

      .phase-node:hover {
        background: var(--bg-hover);
      }
      .phase-node.active-phase {
        background: var(--amber-ghost);
      }

      .phase-bar {
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: var(--bg-elevated);
        position: relative;
        overflow: hidden;
      }

      .phase-bar .fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.3s ease;
      }

      .phase-bar .fill.done {
        background: var(--green);
        width: 100%;
      }
      .phase-bar .fill.running {
        background: var(--amber);
        animation: pulse-bar 1.5s ease infinite;
      }
      .phase-bar .fill.failed {
        background: var(--red);
        width: 100%;
      }
      .phase-bar .fill.skipped {
        background: var(--text-dim);
        width: 100%;
        opacity: 0.3;
      }

      @keyframes pulse-bar {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .phase-label {
        font-family: var(--font-mono);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
      }

      .phase-node.active-phase .phase-label {
        color: var(--amber);
      }

      .phase-iters {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-dim);
      }

      .phase-connector {
        width: 16px;
        height: 2px;
        background: var(--border-mid);
        flex-shrink: 0;
      }

      /* ========== SECTIONS ========== */
      .section {
        background: var(--bg-panel);
        border: 1px solid var(--border-dim);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .section-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-dim);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: background 0.15s;
      }

      .section-header:hover {
        background: var(--bg-hover);
      }

      .section-title {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-primary);
      }

      .section-count {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
      }

      .section-body {
        max-height: 500px;
        overflow-y: auto;
      }

      .section-body::-webkit-scrollbar {
        width: 4px;
      }
      .section-body::-webkit-scrollbar-thumb {
        background: var(--border-mid);
        border-radius: 2px;
      }

      .section.collapsed .section-body {
        display: none;
      }
      .section.collapsed .section-header {
        border-bottom: none;
      }

      /* ========== PLAN STEPS ========== */
      .plan-step {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-dim);
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .plan-step:last-child {
        border-bottom: none;
      }

      .step-num {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        color: var(--amber);
        min-width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--amber-glow);
        border-radius: 50%;
        flex-shrink: 0;
      }

      .step-content {
        flex: 1;
      }

      .step-desc {
        font-size: 12px;
        color: var(--text-primary);
      }

      .step-tool {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--cyan);
        margin-top: 2px;
      }

      /* ========== EVENT LOG ========== */
      .event-item {
        padding: 8px 16px;
        border-bottom: 1px solid var(--border-dim);
        display: flex;
        gap: 10px;
        align-items: flex-start;
        font-size: 12px;
        transition: background 0.1s;
      }

      .event-item:hover {
        background: var(--bg-hover);
      }
      .event-item:last-child {
        border-bottom: none;
      }

      .event-time {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        min-width: 70px;
        flex-shrink: 0;
      }

      .event-type {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 3px;
        min-width: 65px;
        text-align: center;
        flex-shrink: 0;
      }

      .event-type.tool_call {
        background: var(--blue-dim);
        color: var(--blue);
      }
      .event-type.tool_result {
        background: var(--green-dim);
        color: var(--green);
      }
      .event-type.thinking {
        background: var(--purple-dim);
        color: var(--purple);
      }
      .event-type.error {
        background: var(--red-dim);
        color: var(--red);
      }
      .event-type.text {
        background: var(--bg-elevated);
        color: var(--text-secondary);
      }

      .event-detail {
        flex: 1;
        min-width: 0;
      }

      .event-tool-name {
        font-family: var(--font-mono);
        font-weight: 600;
        font-size: 11px;
        color: var(--cyan);
      }

      .event-preview {
        font-size: 11px;
        color: var(--text-secondary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 600px;
      }

      .event-expand {
        display: none;
        margin-top: 6px;
        padding: 8px;
        background: var(--bg-card);
        border-radius: var(--radius-sm);
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }

      .event-item.expanded .event-expand {
        display: block;
      }
      .event-item.expanded .event-preview {
        white-space: normal;
      }

      /* ========== DELIVERY SUMMARY ========== */
      .delivery-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 16px;
      }

      .delivery-card {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        border-radius: var(--radius-md);
        padding: 12px;
      }

      .delivery-label {
        font-family: var(--font-mono);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
        margin-bottom: 4px;
      }

      .delivery-value {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-primary);
        font-weight: 600;
      }

      .delivery-value.hash {
        color: var(--cyan);
      }
      .delivery-value.cost {
        color: var(--amber);
      }

      .delivery-summary {
        padding: 16px;
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.6;
        border-top: 1px solid var(--border-dim);
      }

      /* ========== GUARDRAILS ========== */
      .guardrail-bar {
        padding: 12px 16px;
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }

      .guardrail-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .guardrail-label {
        font-family: var(--font-mono);
        font-size: 9px;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .guardrail-val {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
      }

      .guardrail-val.ok {
        color: var(--green);
      }
      .guardrail-val.warn {
        color: var(--yellow);
      }
      .guardrail-val.danger {
        color: var(--red);
      }

      /* ========== LOADING ========== */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 12px;
        gap: 8px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--border-mid);
        border-top-color: var(--amber);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Jobs</div>
        <div class="sidebar-stats" id="jobStats">--</div>
      </div>
      <div class="filter-bar" id="filterBar">
        <span class="filter-chip active" data-filter="all">All</span>
        <span class="filter-chip" data-filter="done">Done</span>
        <span class="filter-chip" data-filter="pr_ready">PR Ready</span>
        <span class="filter-chip" data-filter="failed">Failed</span>
      </div>
      <div class="job-list" id="jobList">
        <div class="loading">
          <div class="spinner"></div>
          Loading jobs...
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div id="mainContent">
        <div class="empty-state">
          <div class="icon">&#9881;</div>
          <div class="msg">Select a job to view execution details</div>
        </div>
      </div>
    </div>

    <script>
      // ============================================================================
      // STATE
      // ============================================================================
      const state = {
        jobs: [],
        filteredJobs: [],
        selectedJobId: null,
        activeFilter: "all",
        jobDetail: null,
        activePhase: null,
      };

      // ============================================================================
      // API
      // ============================================================================
      async function fetchJobs() {
        try {
          const res = await fetch("/api/jobs");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const jobs = Array.isArray(data) ? data : data.jobs || [];
          return jobs.map((j) => ({
            id: j.job_id || j.id,
            project: j.project_name || j.project || "unknown",
            task: j.description || j.task || "",
            status: j.status || "unknown",
            cost_so_far: j.cost_so_far || 0,
            priority: j.priority || "P2",
            created_at: j.created_at,
          }));
        } catch (e) {
          console.error("fetchJobs:", e);
          return [];
        }
      }

      async function fetchJobDetail(jobId) {
        try {
          const res = await fetch(`/api/jobs/${jobId}/detail`);
          if (!res.ok) return null;
          return await res.json();
        } catch (e) {
          console.error("fetchJobDetail:", e);
          return null;
        }
      }

      // ============================================================================
      // HELPERS
      // ============================================================================
      function fmtTime(iso) {
        if (!iso) return "--";
        const d = new Date(iso);
        return d.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function fmtDate(iso) {
        if (!iso) return "--";
        const d = new Date(iso);
        return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
      }

      function fmtDuration(seconds) {
        if (!seconds) return "--";
        const m = Math.floor(seconds / 60);
        const s = Math.round(seconds % 60);
        return m > 0 ? `${m}m ${s}s` : `${s}s`;
      }

      function fmtCost(v) {
        if (!v) return "$0.0000";
        return `$${Number(v).toFixed(4)}`;
      }

      function escHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function statusClass(s) {
        if (s === "done") return "status-done";
        if (s === "pr_ready") return "status-pr_ready";
        if (s === "running" || s === "in_progress") return "status-running";
        if (s === "queued") return "status-queued";
        return "status-failed";
      }

      // ============================================================================
      // RENDER: Job List
      // ============================================================================
      function applyFilter() {
        const f = state.activeFilter;
        if (f === "all") {
          state.filteredJobs = [...state.jobs];
        } else if (f === "failed") {
          state.filteredJobs = state.jobs.filter(
            (j) => !["done", "pr_ready", "queued", "running", "in_progress"].includes(j.status),
          );
        } else {
          state.filteredJobs = state.jobs.filter((j) => j.status === f);
        }
      }

      function renderJobList() {
        const el = document.getElementById("jobList");
        applyFilter();

        if (state.filteredJobs.length === 0) {
          el.innerHTML =
            '<div class="empty-state"><div class="msg">No jobs match filter</div></div>';
          return;
        }

        el.innerHTML = state.filteredJobs
          .map(
            (j) => `
          <div class="job-card ${j.id === state.selectedJobId ? "active" : ""}" data-id="${escHtml(j.id)}">
            <div class="job-card-row">
              <div class="job-project">${escHtml(j.project)}</div>
              <span class="status-badge ${statusClass(j.status)}">${escHtml(j.status)}</span>
            </div>
            <div class="job-desc">${escHtml(j.task.substring(0, 80))}</div>
            <div class="job-meta">
              <span class="cost">${fmtCost(j.cost_so_far)}</span>
              <span>${escHtml(j.priority)}</span>
              <span>${fmtDate(j.created_at)} ${fmtTime(j.created_at)}</span>
            </div>
          </div>
        `,
          )
          .join("");

        el.querySelectorAll(".job-card").forEach((card) => {
          card.addEventListener("click", () => selectJob(card.dataset.id));
        });

        document.getElementById("jobStats").textContent =
          `${state.filteredJobs.length}/${state.jobs.length}`;
      }

      // ============================================================================
      // RENDER: Job Detail
      // ============================================================================
      function renderJobDetail(detail) {
        const mc = document.getElementById("mainContent");
        if (!detail || !detail.result) {
          mc.innerHTML =
            '<div class="empty-state"><div class="msg">No execution data for this job</div></div>';
          return;
        }

        const r = detail.result;
        const g = r.guardrails || {};
        const pi = g.phase_iterations || {};
        const phases = ["research", "plan", "execute", "verify", "deliver"];
        const phaseData = r.phases || {};

        // Duration
        let duration = null;
        if (r.started_at && r.completed_at) {
          duration = (new Date(r.completed_at) - new Date(r.started_at)) / 1000;
        }

        mc.innerHTML = `
          <!-- HEADER -->
          <div class="main-header">
            <div>
              <div class="main-title">${escHtml(detail.job_id)}</div>
              <div class="main-subtitle">
                ${fmtDate(r.started_at)} ${fmtTime(r.started_at)} &mdash; ${fmtTime(r.completed_at)}
                ${duration ? ` (${fmtDuration(duration)})` : ""}
              </div>
            </div>
            <div class="main-badges">
              ${r.agent ? `<span class="agent-badge">${escHtml(r.agent)}</span>` : ""}
              ${r.department ? `<span class="agent-badge">${escHtml(r.department)}</span>` : ""}
              <span class="success-badge ${r.success ? "pass" : "fail"}">${r.success ? "SUCCESS" : "FAILED"}</span>
              <span class="cost-badge">${fmtCost(r.cost_usd)}</span>
            </div>
          </div>

          <div class="content-scroll" id="contentScroll">
            <!-- PIPELINE -->
            <div class="pipeline" id="phasePipeline">
              ${phases
                .map((p, i) => {
                  const pd = phaseData[p] || {};
                  const iters = pi[p] || 0;
                  let fillClass = "skipped";
                  if (pd.status === "done") fillClass = "done";
                  else if (pd.status === "running") fillClass = "running";
                  else if (pd.status === "failed" || pd.status === "error") fillClass = "failed";
                  else if (iters > 0) fillClass = "done";

                  return `
                  ${i > 0 ? '<div class="phase-connector"></div>' : ""}
                  <div class="phase-node ${state.activePhase === p ? "active-phase" : ""}" data-phase="${p}">
                    <div class="phase-bar"><div class="fill ${fillClass}"></div></div>
                    <div class="phase-label">${p}</div>
                    <div class="phase-iters">${iters} iter</div>
                  </div>
                `;
                })
                .join("")}
            </div>

            <!-- GUARDRAILS -->
            <div class="section">
              <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <div class="section-title">Guardrails</div>
              </div>
              <div class="section-body">
                <div class="guardrail-bar">
                  <div class="guardrail-item">
                    <div class="guardrail-label">Iterations</div>
                    <div class="guardrail-val ${g.iterations > g.max_iterations * 0.8 ? "warn" : "ok"}">${g.iterations || 0} / ${g.max_iterations || 200}</div>
                  </div>
                  <div class="guardrail-item">
                    <div class="guardrail-label">Cost</div>
                    <div class="guardrail-val ${(g.cost_usd || 0) > (g.max_cost_usd || 3) * 0.8 ? "warn" : "ok"}">${fmtCost(g.cost_usd)} / ${fmtCost(g.max_cost_usd)}</div>
                  </div>
                  <div class="guardrail-item">
                    <div class="guardrail-label">Duration</div>
                    <div class="guardrail-val ok">${fmtDuration(g.elapsed_seconds)} / ${fmtDuration(g.max_duration_seconds)}</div>
                  </div>
                  <div class="guardrail-item">
                    <div class="guardrail-label">Errors</div>
                    <div class="guardrail-val ${(g.recent_errors || 0) > 0 ? "danger" : "ok"}">${g.recent_errors || 0}</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- PLAN -->
            ${detail.plan ? renderPlanSection(detail.plan) : ""}

            <!-- DELIVERY -->
            ${phaseData.deliver ? renderDeliverySection(phaseData.deliver, r) : ""}

            <!-- PHASE EVENT LOGS -->
            <div id="phaseEvents">
              ${state.activePhase ? renderPhaseEvents(detail, state.activePhase) : renderPhaseEvents(detail, "execute")}
            </div>
          </div>
        `;

        // Phase click handlers
        document.querySelectorAll(".phase-node").forEach((node) => {
          node.addEventListener("click", () => {
            state.activePhase = node.dataset.phase;
            document
              .querySelectorAll(".phase-node")
              .forEach((n) => n.classList.remove("active-phase"));
            node.classList.add("active-phase");
            document.getElementById("phaseEvents").innerHTML = renderPhaseEvents(
              detail,
              state.activePhase,
            );
            attachEventExpanders();
          });
        });

        // Default highlight
        if (!state.activePhase) {
          state.activePhase = "execute";
          const execNode = document.querySelector('.phase-node[data-phase="execute"]');
          if (execNode) execNode.classList.add("active-phase");
        }

        attachEventExpanders();
      }

      function renderPlanSection(plan) {
        const steps = plan.steps || [];
        if (steps.length === 0) return "";

        return `
          <div class="section">
            <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
              <div class="section-title">Execution Plan</div>
              <div class="section-count">${steps.length} steps</div>
            </div>
            <div class="section-body">
              ${steps
                .map(
                  (s, i) => `
                <div class="plan-step">
                  <div class="step-num">${i + 1}</div>
                  <div class="step-content">
                    <div class="step-desc">${escHtml(s.description || s.step || s.action || JSON.stringify(s))}</div>
                    ${s.tool ? `<div class="step-tool">${escHtml(s.tool)}</div>` : ""}
                    ${s.tools ? `<div class="step-tool">${escHtml(s.tools.join(", "))}</div>` : ""}
                  </div>
                </div>
              `,
                )
                .join("")}
            </div>
          </div>
        `;
      }

      function renderDeliverySection(deliver, result) {
        const d = deliver;
        return `
          <div class="section">
            <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
              <div class="section-title">Delivery</div>
              <div class="section-count">${d.delivered ? "Delivered" : "Not delivered"}</div>
            </div>
            <div class="section-body">
              <div class="delivery-grid">
                <div class="delivery-card">
                  <div class="delivery-label">Commit</div>
                  <div class="delivery-value hash">${escHtml(d.commit_hash || "none")}</div>
                </div>
                <div class="delivery-card">
                  <div class="delivery-label">Pushed</div>
                  <div class="delivery-value">${d.pushed ? "Yes" : "No"}</div>
                </div>
                <div class="delivery-card">
                  <div class="delivery-label">Tool Calls</div>
                  <div class="delivery-value">${d.tool_calls_made || 0}</div>
                </div>
                <div class="delivery-card">
                  <div class="delivery-label">Verify Passed</div>
                  <div class="delivery-value" style="color: ${result.phases?.verify?.passed ? "var(--green)" : "var(--red)"}">
                    ${result.phases?.verify?.passed ? "Yes" : "No"}
                  </div>
                </div>
              </div>
              ${d.summary ? `<div class="delivery-summary">${escHtml(d.summary)}</div>` : ""}
            </div>
          </div>
        `;
      }

      function renderPhaseEvents(detail, phaseName) {
        const phaseLog = (detail.phases || {})[phaseName];
        if (!phaseLog || !phaseLog.events || phaseLog.events.length === 0) {
          return `
            <div class="section">
              <div class="section-header">
                <div class="section-title">${escHtml(phaseName)} Log</div>
                <div class="section-count">0 events</div>
              </div>
            </div>
          `;
        }

        const events = phaseLog.events;
        return `
          <div class="section">
            <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
              <div class="section-title">${escHtml(phaseName)} Log</div>
              <div class="section-count">${phaseLog.event_count} events (showing ${events.length})</div>
            </div>
            <div class="section-body">
              ${events.map((ev) => renderEvent(ev)).join("")}
            </div>
          </div>
        `;
      }

      function renderEvent(ev) {
        const type = ev.event || ev.type || "unknown";
        const time = fmtTime(ev.timestamp);
        let toolName = ev.tool || "";
        let preview = "";
        let expandData = "";

        if (type === "tool_call") {
          preview = ev.input ? JSON.stringify(ev.input).substring(0, 120) : "";
          expandData = ev.input ? JSON.stringify(ev.input, null, 2) : "";
        } else if (type === "tool_result") {
          const result =
            typeof ev.result === "string" ? ev.result : JSON.stringify(ev.result || "");
          preview = result.substring(0, 120);
          expandData = result;
        } else if (type === "thinking") {
          preview = (ev.content || ev.text || "").substring(0, 120);
          expandData = ev.content || ev.text || "";
        } else if (type === "text") {
          preview = (ev.content || ev.text || "").substring(0, 120);
          expandData = ev.content || ev.text || "";
        } else if (type === "error") {
          preview = (ev.error || ev.message || "").substring(0, 120);
          expandData = ev.error || ev.message || "";
        } else {
          preview = JSON.stringify(ev).substring(0, 120);
          expandData = JSON.stringify(ev, null, 2);
        }

        return `
          <div class="event-item" data-expandable>
            <div class="event-time">${time}</div>
            <div class="event-type ${escHtml(type)}">${escHtml(type)}</div>
            <div class="event-detail">
              ${toolName ? `<div class="event-tool-name">${escHtml(toolName)}</div>` : ""}
              <div class="event-preview">${escHtml(preview)}</div>
              <div class="event-expand">${escHtml(expandData)}</div>
            </div>
          </div>
        `;
      }

      function attachEventExpanders() {
        document.querySelectorAll(".event-item[data-expandable]").forEach((item) => {
          item.addEventListener("click", () => {
            item.classList.toggle("expanded");
          });
        });
      }

      // ============================================================================
      // ACTIONS
      // ============================================================================
      async function loadJobs() {
        state.jobs = await fetchJobs();
        renderJobList();
      }

      async function selectJob(jobId) {
        state.selectedJobId = jobId;
        state.activePhase = null;
        renderJobList();

        const mc = document.getElementById("mainContent");
        mc.innerHTML =
          '<div class="loading"><div class="spinner"></div> Loading execution data...</div>';

        const detail = await fetchJobDetail(jobId);
        state.jobDetail = detail;

        if (detail) {
          renderJobDetail(detail);
        } else {
          // No run data — show basic info from job list
          const job = state.jobs.find((j) => j.id === jobId);
          mc.innerHTML = `
            <div class="main-header">
              <div>
                <div class="main-title">${escHtml(jobId)}</div>
                <div class="main-subtitle">${job ? escHtml(job.project) : ""}</div>
              </div>
              <div class="main-badges">
                ${job ? `<span class="status-badge ${statusClass(job.status)}">${escHtml(job.status)}</span>` : ""}
              </div>
            </div>
            <div class="content-scroll">
              <div class="empty-state">
                <div class="msg">No execution logs available for this job</div>
                <div style="font-size:12px; color:var(--text-dim)">
                  Run data is only available for jobs that executed through the autonomous pipeline.
                </div>
              </div>
            </div>
          `;
        }
      }

      // ============================================================================
      // FILTER HANDLERS
      // ============================================================================
      document.getElementById("filterBar").addEventListener("click", (e) => {
        const chip = e.target.closest(".filter-chip");
        if (!chip) return;
        document.querySelectorAll(".filter-chip").forEach((c) => c.classList.remove("active"));
        chip.classList.add("active");
        state.activeFilter = chip.dataset.filter;
        renderJobList();
      });

      // ============================================================================
      // INIT
      // ============================================================================
      async function initialize() {
        await loadJobs();
        setInterval(loadJobs, 15000);
      }

      initialize();
    </script>
  </body>
</html>
