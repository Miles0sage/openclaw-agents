services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: 8000
      GATEWAY_AUTH_TOKEN: ${GATEWAY_AUTH_TOKEN:-dev-token}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://gateway:8000
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
