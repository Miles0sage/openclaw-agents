name: Benchmark Suite

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run (easy/medium/hard/all)"
        default: "easy"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyyaml
      - run: |
          python -m benchmarks             --suite=${{ github.event.inputs.suite || 'easy' }}             --output=benchmarks/results/ci_latest.json             --report=benchmarks/results/ci_latest.md             --pass-threshold=0.8
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/ci_latest.*
