id: add-rate-limiter
category: security
difficulty: medium
description: |
  Add per-IP rate limiter middleware to block more than 60 req/min.
agent_key: coder_agent
max_cost_usd: 0.08
max_duration_sec: 90

setup:
  files:
    - path: src/app.py
      content: |
        from fastapi import FastAPI
        app = FastAPI()

expected:
  files:
    - path: src/app.py
      contains: ["rate", "429"]
