name = "personal-assistant"
main = "src/index.ts"
compatibility_date = "2026-02-19"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Environment variables (override via wrangler secret for production)
[vars]
GATEWAY_URL = "https://<your-domain>"
GATEWAY_TOKEN = "f981afbc4a94f50a87cd0184cf560ec646e8f8a65a7234f603b980e43775f1a3"
ENVIRONMENT = "development"
RATE_LIMIT_PER_MINUTE = "30"
GEMINI_MODEL = "gemini-2.5-flash"

# D1 Database binding (session storage)
[[d1_databases]]
binding = "DB"
database_name = "personal-assistant"
database_id = "9cf10366-f49c-4532-89c2-8859e1ed9673"

# KV bindings (cache + sessions)
[[kv_namespaces]]
binding = "KV_CACHE"
id = "35795036d1084b8284a8c57f4b170618"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "a4119f70fe7d42ecb8b8b49569c11e32"

[env.production]
name = "personal-assistant"
routes = [{ pattern = "<your-domain>/*", zone_name = "<your-domain>" }]

[env.production.vars]
ENVIRONMENT = "production"
GATEWAY_URL = "https://<your-domain>"
GATEWAY_TOKEN = "f981afbc4a94f50a87cd0184cf560ec646e8f8a65a7234f603b980e43775f1a3"
RATE_LIMIT_PER_MINUTE = "30"
GEMINI_MODEL = "gemini-2.5-flash"

[[env.production.kv_namespaces]]
binding = "KV_CACHE"
id = "35795036d1084b8284a8c57f4b170618"

[[env.production.kv_namespaces]]
binding = "KV_SESSIONS"
id = "a4119f70fe7d42ecb8b8b49569c11e32"

[[env.production.d1_databases]]
binding = "DB"
database_name = "personal-assistant"
database_id = "9cf10366-f49c-4532-89c2-8859e1ed9673"

[env.development]
name = "personal-assistant-dev"
vars = { ENVIRONMENT = "development" }

# Cron triggers — CEO-only tasks (life management crons handled by PA worker)
# 17:00 UTC = 10am MST (auto-grade yesterday's predictions)
# 21:00 UTC = 2pm MST (auto-log today's predictions before games)
# 00:00 UTC = 5pm MST (start of Miles' work shift)
[triggers]
crons = ["0 17 * * *", "0 21 * * *", "0 0 * * *"]

[env.production.triggers]
crons = ["0 17 * * *", "0 21 * * *", "0 0 * * *"]

[limits]
cpu_ms = 50000
